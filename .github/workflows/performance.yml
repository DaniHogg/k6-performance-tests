name: k6 Performance Tests

on:
  # Run on schedule (nightly)
  schedule:
    - cron: '0 2 * * *'  # 2 AM UTC daily
  
  # Run on pull request
  pull_request:
    branches:
      - main
      - develop
  
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test to run'
        required: true
        default: 'baseline'
        type: choice
        options:
          - baseline
          - ramp-up
          - soak
          - spike
          - stress
          - all

jobs:
  performance-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      # Baseline runs on every trigger and is the primary showcase test.
      # handleSummary in baseline.js writes results/baseline-summary.json.
      - name: Run baseline test
        if: >
          github.event_name == 'pull_request' ||
          github.event_name == 'schedule' ||
          github.event.inputs.test_type == 'baseline' ||
          github.event.inputs.test_type == 'all'
        run: npm run test:baseline
        continue-on-error: true

      - name: Run ramp-up test
        if: >
          github.event_name == 'schedule' ||
          github.event.inputs.test_type == 'ramp-up' ||
          github.event.inputs.test_type == 'all'
        run: npm run test:ramp-up
        continue-on-error: true

      - name: Run soak test
        if: >
          github.event_name == 'schedule' ||
          github.event.inputs.test_type == 'soak' ||
          github.event.inputs.test_type == 'all'
        run: npm run test:soak
        continue-on-error: true

      - name: Run spike test
        if: >
          github.event.inputs.test_type == 'spike' ||
          github.event.inputs.test_type == 'all'
        run: npm run test:spike
        continue-on-error: true

      - name: Run stress test
        if: >
          github.event.inputs.test_type == 'stress' ||
          github.event.inputs.test_type == 'all'
        run: npm run test:stress
        continue-on-error: true

      # Generate the normalised k6-results.json consumed by the live portfolio site.
      # Requires results/baseline-summary.json from the baseline test run.
      - name: Generate normalized k6 results JSON
        if: always()
        run: npm run generate-k6-json
        continue-on-error: true

      - name: Generate HTML report
        if: always()
        run: npm run report
        continue-on-error: true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: results/
          retention-days: 30

      # Upload the normalised summary as a separate artifact so the live site
      # workflow can download it by name via repository_dispatch.
      - name: Upload k6 results JSON artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-json
          path: results/k6-results.json
          retention-days: 30

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✓ Performance baseline test completed. Check artifacts for results.'
            })
        continue-on-error: true

      # Notify the live portfolio site so it can refresh the k6 project card.
      - name: Dispatch results to portfolio site
        if: always()
        uses: actions/github-script@v7
        env:
          PORTFOLIO_DISPATCH_TOKEN: ${{ secrets.PORTFOLIO_DISPATCH_TOKEN }}
        with:
          github-token: ${{ secrets.PORTFOLIO_DISPATCH_TOKEN }}
          script: |
            if (!process.env.PORTFOLIO_DISPATCH_TOKEN) {
              console.log('PORTFOLIO_DISPATCH_TOKEN is not set. Skipping repository dispatch.');
              return;
            }

            await github.rest.repos.createDispatchEvent({
              owner: 'DaniHogg',
              repo: 'qa-portfolio-live-site',
              event_type: 'portfolio-results-ready',
              client_payload: {
                source_repo: 'DaniHogg/k6-performance-tests',
                source_workflow: 'performance.yml',
                source_run_id: String(context.runId),
                source_run_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                source_artifact: 'k6-json',
                source_branch: context.ref.replace('refs/heads/', ''),
                source_commit_sha: context.sha,
              },
            });
        continue-on-error: true

  results:
    runs-on: ubuntu-latest
    needs: performance-tests
    if: always()
    
    steps:
      - name: Download results
        uses: actions/download-artifact@v4
        with:
          name: k6-results

      - name: Display summary
        run: |
          echo "### Performance Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "k6-results.json" ]; then
            STATUS=$(node -e "const d=require('./k6-results.json'); console.log(d.status || 'unknown')" 2>/dev/null || echo "unknown")
            P95=$(node -e "const d=require('./k6-results.json'); console.log(d.metric_rows?.find(r=>r.name.includes('P95'))?.value || 'n/a')" 2>/dev/null || echo "n/a")
            ERROR_RATE=$(node -e "const d=require('./k6-results.json'); console.log(d.metric_rows?.find(r=>r.name.includes('Error'))?.value || 'n/a')" 2>/dev/null || echo "n/a")
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Status | ${STATUS} |" >> $GITHUB_STEP_SUMMARY
            echo "| P95 Response Time | ${P95} |" >> $GITHUB_STEP_SUMMARY
            echo "| Error Rate | ${ERROR_RATE} |" >> $GITHUB_STEP_SUMMARY
          elif [ -f "index.html" ]; then
            echo "✓ HTML report generated" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Results available in artifacts" >> $GITHUB_STEP_SUMMARY

