name: k6 Performance Tests

on:
  # Run on schedule (nightly)
  schedule:
    - cron: '0 2 * * *'  # 2 AM UTC daily
  
  # Run on pull request
  pull_request:
    branches:
      - main
      - develop
  
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test to run'
        required: true
        default: 'baseline'
        type: choice
        options:
          - baseline
          - ramp-up
          - soak
          - spike
          - stress
          - all

jobs:
  performance-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run baseline test
        if: github.event_name == 'pull_request' || github.event.inputs.test_type == 'baseline' || github.event.inputs.test_type == 'all'
        run: npm run test:baseline
        continue-on-error: true

      - name: Run ramp-up test
        if: github.event.schedule == '0 2 * * *' || github.event.inputs.test_type == 'ramp-up' || github.event.inputs.test_type == 'all'
        run: npm run test:ramp-up
        continue-on-error: true

      - name: Run soak test
        if: github.event.schedule == '0 2 * * *' || github.event.inputs.test_type == 'soak' || github.event.inputs.test_type == 'all'
        run: npm run test:soak
        continue-on-error: true

      - name: Run spike test
        if: github.event.inputs.test_type == 'spike' || github.event.inputs.test_type == 'all'
        run: npm run test:spike
        continue-on-error: true

      - name: Run stress test
        if: github.event.inputs.test_type == 'stress' || github.event.inputs.test_type == 'all'
        run: npm run test:stress
        continue-on-error: true

      - name: Generate HTML report
        if: always()
        run: npm run report
        continue-on-error: true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: results/
          retention-days: 30

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✓ Performance baseline test completed. Check artifacts for results.'
            })
        continue-on-error: true

  results:
    runs-on: ubuntu-latest
    needs: performance-tests
    if: always()
    
    steps:
      - name: Download results
        uses: actions/download-artifact@v4
        with:
          name: k6-results

      - name: Display summary
        run: |
          echo "### Performance Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "index.html" ]; then
            echo "✓ HTML report generated" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Results available in artifacts" >> $GITHUB_STEP_SUMMARY
